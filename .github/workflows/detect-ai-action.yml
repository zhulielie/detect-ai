name: Detect AI Code

on: [push, pull_request]

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install detect-ai
        run: pip install detect-ai
      - name: Scan code
        run: detect-ai scan . --format markdown --output AI_REPORT.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ai-detection-report
          path: AI_REPORT.md
