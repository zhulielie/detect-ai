name: Detect AI Code

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect AI fingerprints
        uses: ./
        with:
          path: .
          threshold: 75
          format: markdown
          verbose: true
          git-check: true
